<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exp1-ports</title>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.4/joint.css" />
  </head>
  <body>
    <!-- content -->
    <div id="myholder"></div>

    <!-- dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.1/backbone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.4/joint.js"></script>

    <!-- code -->
    <script>
      const namespace = joint.shapes;
      const graph = new joint.dia.Graph({}, { cellNamespace: namespace });
      const paper = new joint.dia.Paper({
        el: document.getElementById("myholder"),
        width: 1000,
        height: 500,
        gridSize: 1,
        model: graph,
        gridSize: 10,
        drawGrid: true,
        background: {
          color: "rgba(0, 255, 0, 0.3)"
        },
        cellViewNamespace: namespace,
        linkPinning: false, // Prevent link being dropped in blank paper area
        defaultLink: () => new joint.shapes.standard.Link(),
        defaultConnectionPoint: { name: "boundary" },
        validateConnection: function (cellViewS, magnetS, cellViewT, magnetT, end, linkView) {
          // Prevent loop linking
          return magnetS !== magnetT;
        }
      });

      const port = {
        position: {
          name: "right"
        },
        attrs: {
          portStyle: {
            magnet: true,
            r: 5,
            fill: "#023047",
            stroke: "#023047"
          }
        },
        label: {
          position: {
            name: "left",
            args: { y: 6 }
          },
          markup: [
            {
              tagName: "text",
              selector: "label",
              className: "label-text"
            }
          ]
        },
        markup: [
          {
            tagName: "circle",
            selector: "portStyle"
          }
        ]
      };

      const rect1 = new joint.shapes.standard.Rectangle({
        position: { x: 100, y: 50 },
        size: { width: 90, height: 90 },
        attrs: {
          body: {
            fill: "#8ECAE6"
          }
        },
        ports: {
          items: [port]
        }
      });

      const rect2 = rect1.clone();
      rect2.position(500, 50);

      graph.addCells(rect1, rect2);

      // Register events
      paper.on("link:mouseenter", linkView => {
        showLinkTools(linkView);
      });

      paper.on("link:mouseleave", linkView => {
        linkView.removeTools();
      });

      const verticesTool = new joint.linkTools.Vertices({});
      const segmentsTool = new joint.linkTools.Segments();
      const sourceArrowheadTool = new joint.linkTools.SourceArrowhead();
      const targetArrowheadTool = new joint.linkTools.TargetArrowhead();
      const sourceAnchorTool = new joint.linkTools.SourceAnchor();
      const targetAnchorTool = new joint.linkTools.TargetAnchor();
      const boundaryTool = new joint.linkTools.Boundary();

      function showLinkTools(linkView) {
        const tools = new joint.dia.ToolsView({
          tools: [
            verticesTool,
            segmentsTool,
            boundaryTool,
            sourceArrowheadTool,
            targetArrowheadTool,
            sourceAnchorTool,
            targetAnchorTool
          ]
        });
        linkView.addTools(tools);
      }
    </script>
  </body>
</html>
